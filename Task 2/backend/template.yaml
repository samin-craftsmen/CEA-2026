AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Meal Headcount Planner Backend - Serverless deployment

Globals:
  Function:
    Runtime: provided.al2023
    Architectures:
      - x86_64
    Timeout: 10
    MemorySize: 128
    Environment:
      Variables:
        DYNAMODB_REGION: !Ref AWS::Region
        DYNAMODB_TABLE: !Ref MealHeadcountTable

Resources:
  ApiFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      FunctionName: meal-headcount-api
      Handler: bootstrap
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref MealHeadcountTable
      Events:
        HealthCheck:
          Type: Api
          Properties:
            Path: /health
            Method: get

  MealHeadcountTable:
  Type: AWS::DynamoDB::Table
  Properties:
    TableName: trainee-2026-samin-dynamoDB-mhp
    BillingMode: PAY_PER_REQUEST
    AttributeDefinitions:
      - AttributeName: PK
        AttributeType: S
      - AttributeName: SK
        AttributeType: S
    KeySchema:
      - AttributeName: PK
        KeyType: HASH   # Partition key
      - AttributeName: SK
        KeyType: RANGE  # Sort key

Outputs:
  ApiBaseUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"

  HealthEndpoint:
    Description: Health check endpoint
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/health"
